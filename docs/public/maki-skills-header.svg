<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">maki-skills header image</title>
  <desc id="desc">A public Codex skill registry header with a geometric skill stack and connected skill tiles.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.26"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#111827"/>
  <rect x="56" y="56" width="1088" height="518" rx="34" fill="#f8fafc"/>
  <rect x="78" y="78" width="1044" height="474" rx="26" fill="#ffffff"/>

  <g transform="translate(110 112)" filter="url(#softShadow)">
    <rect width="116" height="116" rx="24" fill="#111827"/>
    <path d="M29 28h39a8 8 0 0 1 8 8v12H37a8 8 0 0 1-8-8z" fill="#38bdf8"/>
    <path d="M29 52h57a8 8 0 0 1 8 8v12H37a8 8 0 0 1-8-8z" fill="#f59e0b"/>
    <path d="M29 76h47a8 8 0 0 1 8 8v12H37a8 8 0 0 1-8-8z" fill="#22c55e"/>
    <path d="M84 36v48" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round"/>
    <circle cx="84" cy="36" r="10" fill="#e5e7eb"/>
    <circle cx="84" cy="60" r="10" fill="#e5e7eb"/>
    <circle cx="84" cy="84" r="10" fill="#e5e7eb"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#111827">
    <text x="258" y="151" font-size="64" font-weight="800">maki-skills</text>
    <text x="260" y="197" font-size="28" font-weight="650" fill="#334155">Public Codex skill registry for Maki</text>
    <text x="260" y="238" font-size="22" fill="#475569">Keep portable public skills synchronized without publishing local runtime state.</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">
    <rect x="260" y="280" width="190" height="46" rx="23" fill="#dbeafe"/>
    <text x="286" y="310" fill="#1d4ed8">29 public skills</text>
    <rect x="466" y="280" width="188" height="46" rx="23" fill="#dcfce7"/>
    <text x="492" y="310" fill="#15803d">Windows-first</text>
    <rect x="670" y="280" width="194" height="46" rx="23" fill="#fef3c7"/>
    <text x="696" y="310" fill="#b45309">GitHub Pages</text>
  </g>

  <g transform="translate(110 382)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="324" height="104" rx="18" fill="#111827"/>
    <text x="28" y="42" font-size="21" font-weight="750" fill="#f8fafc">Public-only guardrails</text>
    <text x="28" y="73" font-size="17" fill="#cbd5e1">Submodules stay reviewable.</text>
  </g>
  <g transform="translate(458 382)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="286" height="104" rx="18" fill="#eef2ff"/>
    <text x="28" y="42" font-size="21" font-weight="750" fill="#3730a3">Portable setup</text>
    <text x="28" y="73" font-size="17" fill="#475569">Clone, init, update.</text>
  </g>
  <g transform="translate(768 382)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="246" height="104" rx="18" fill="#ecfeff"/>
    <text x="28" y="42" font-size="21" font-weight="750" fill="#0e7490">Docs ready</text>
    <text x="28" y="73" font-size="17" fill="#475569">VitePress + Pages.</text>
  </g>

  <g transform="translate(1048 118)" filter="url(#softShadow)">
    <path d="M36 64v176" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
    <path d="M36 90h44M36 150h44M36 210h44" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
    <rect x="0" y="16" width="72" height="56" rx="16" fill="#e0f2fe"/>
    <rect x="80" y="62" width="72" height="56" rx="16" fill="#fff7ed"/>
